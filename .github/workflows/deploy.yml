name: QA CI/CD Pipeline

on:
  push:
    branches:
      - qa

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🔹 Build & Push Backend
    - name: Build & Push Backend
      run: |
        docker build -t pavankamasani/qabackend ./backend
        docker push pavankamasani/qabackend

    # 🔹 Build & Push Frontend
    - name: Build & Push Frontend
      run: |
        docker build -t pavankamasani/qafrontend ./frontend
        docker push pavankamasani/qafrontend

    # 🔹 Deploy to EC2
    - name: Deploy QA to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "🚀 Starting QA Deployment..."

          # 🔥 STEP 1: Remove old containers by NAME (fix name conflict)
          docker rm -f qa-backend qa-frontend || true

          # 🔥 STEP 2: Remove any container using ports (fix port conflict)
          docker ps -q --filter "publish=5002" | xargs -r docker rm -f
          docker ps -q --filter "publish=3002" | xargs -r docker rm -f

          # 🔥 STEP 3: Pull latest images
          docker pull pavankamasani/qabackend
          docker pull pavankamasani/qafrontend

          # 🔥 STEP 4: Run new containers
          docker run -d -p 5002:5000 --name qa-backend pavankamasani/qabackend
          docker run -d -p 3002:80 --name qa-frontend pavankamasani/qafrontend

          echo "✅ QA Deployment Completed Successfully!"
