name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend Image
      run: docker build -t pavankamasani/qabackend ./backend

    - name: Push Backend Image
      run: docker push pavankamasani/qabackend

    - name: Build Frontend Image
      run: docker build -t pavankamasani/qafrontend ./frontend

    - name: Push Frontend Image
      run: docker push pavankamasani/qafrontend

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull pavankamasani/qabackend
          docker pull pavankamasani/qafrontend

          docker rm -f backend frontend || true

          docker run -d -p 5002:5000 --name backend pavankamasani/qabackend
          docker run -d -p 3002:80 --name frontend pavankamasani/qafrontend
