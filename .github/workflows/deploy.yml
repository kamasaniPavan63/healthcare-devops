name: QA CI/CD Pipeline

on:
  push:
    branches:
      - qa

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Backend
    - name: Build & Push Backend
      run: |
        docker build -t pavankamasani/qabackend ./backend
        docker push pavankamasani/qabackend

    # Frontend
    - name: Build & Push Frontend
      run: |
        docker build -t pavankamasani/qafrontend ./frontend
        docker push pavankamasani/qafrontend

    # Deploy
    - name: Deploy QA
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull pavankamasani/qabackend
          docker pull pavankamasani/qafrontend

          docker rm -f qa-backend qa-frontend || true

          docker run -d -p 5002:5000 --name qa-backend pavankamasani/qabackend
          docker run -d -p 3002:80 --name qa-frontend pavankamasani/qafrontend
