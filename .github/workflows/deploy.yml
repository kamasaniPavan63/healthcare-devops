name: Dev CI/CD Pipeline

on:
  push:
    branches:
      - dev   # 👈 trigger only on dev branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🔹 Backend (DEV)
    - name: Build Backend Image
      run: docker build -t pavankamasani/devbackend ./backend

    - name: Push Backend Image
      run: docker push pavankamasani/devbackend

    # 🔹 Frontend (DEV)
    - name: Build Frontend Image
      run: docker build -t pavankamasani/devfrontend ./frontend

    - name: Push Frontend Image
      run: docker push pavankamasani/devfrontend

    # 🔹 Deploy to EC2 (DEV)
    - name: Deploy to EC2 Dev Server
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.DEV_EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.DEV_EC2_SSH_KEY }}
        script: |
          docker pull pavankamasani/devbackend
          docker pull pavankamasani/devfrontend

          docker rm -f dev-backend dev-frontend || true

          docker run -d -p 5000:5000 --name dev-backend pavankamasani/devbackend
          docker run -d -p 3000:80 --name dev-frontend pavankamasani/devfrontend
