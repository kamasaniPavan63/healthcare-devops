<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Healthcare Security Platform</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .register-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .register-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 580px;
      box-shadow: var(--shadow), var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }
    .register-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--primary));
    }
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .role-btn {
      padding: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-panel);
      color: var(--text-secondary);
      cursor: pointer;
      text-align: center;
      font-size: 0.85rem;
      font-family: var(--font-body);
      transition: var(--transition);
    }
    .role-btn.selected {
      border-color: var(--primary);
      background: rgba(10,132,255,0.1);
      color: var(--primary);
    }
    .role-btn .role-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }
    .role-btn .role-label { font-weight: 600; }
    .dynamic-fields { margin-top: 0.5rem; }
    .error-msg {
      display: none;
      background: rgba(255,59,48,0.08);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--danger);
      margin-bottom: 1rem;
    }
    .success-msg {
      display: none;
      background: rgba(0,214,143,0.08);
      border: 1px solid rgba(0,214,143,0.2);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="register-wrapper">
    <div class="register-card">
      <div class="brand-logo">
        <div class="logo-icon">🏥</div>
        <div>
          <div class="brand-name">MedSecure</div>
          <span class="brand-tag">Healthcare Security Platform</span>
        </div>
      </div>

      <h2 style="font-size:1.4rem; margin-bottom:0.3rem;">Create Account</h2>
      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem;">Join the secure healthcare platform</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="registerForm">
        <!-- Role Selection -->
        <div class="form-group">
          <label class="form-label">Register As</label>
          <div class="role-selector">
            <button type="button" class="role-btn selected" data-role="patient" onclick="selectRole('patient', this)">
              <span class="role-icon">🤒</span>
              <span class="role-label">Patient</span>
            </button>
            <button type="button" class="role-btn" data-role="doctor" onclick="selectRole('doctor', this)">
              <span class="role-icon">👨‍⚕️</span>
              <span class="role-label">Doctor</span>
            </button>
          </div>
          <input type="hidden" id="selectedRole" value="patient">
        </div>

        <!-- Common Fields -->
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Min 8 characters" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required>
          </div>
        </div>

        <!-- Dynamic Fields -->
        <div class="dynamic-fields" id="dynamicFields"></div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="registerBtn" style="margin-top:0.5rem;">
          Create Account
        </button>
      </form>

      <hr class="divider">
      <p style="text-align:center; font-size:0.85rem; color:var(--text-muted);">
        Already have an account? <a href="login.html" style="color:var(--primary); text-decoration:none; font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if (Auth.isLoggedIn()) Auth.redirectToDashboard();

    const patientFields = `
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Age</label>
          <input type="number" class="form-control" id="age" placeholder="25" min="1" max="120">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select class="form-select" id="gender">
            <option value="">Select</option>
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Blood Group</label>
          <select class="form-select" id="blood_group">
            <option value="">Select</option>
            <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option><option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Emergency Contact</label>
          <input type="text" class="form-control" id="emergency_contact" placeholder="+91 9999999999">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Medical History (optional)</label>
        <textarea class="form-control" id="medical_history" rows="2" placeholder="Any existing conditions..."></textarea>
      </div>
    `;

    const doctorFields = `
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Specialization</label>
          <input type="text" class="form-control" id="specialization" placeholder="Cardiology" required>
        </div>
        <div class="form-group">
          <label class="form-label">License Number</label>
          <input type="text" class="form-control" id="license_number" placeholder="MCI-12345" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Hospital / Clinic</label>
          <input type="text" class="form-control" id="hospital" placeholder="City General Hospital">
        </div>
        <div class="form-group">
          <label class="form-label">Experience (years)</label>
          <input type="number" class="form-control" id="experience_years" placeholder="5" min="0">
        </div>
      </div>
      <div class="form-group" style="background:rgba(255,149,0,0.06);border:1px solid rgba(255,149,0,0.2);border-radius:var(--radius);padding:0.75rem 1rem;">
        <p style="color:var(--warning);font-size:0.82rem;margin:0;">⚠️ Doctor accounts require admin approval before activation.</p>
      </div>
    `;

    function selectRole(role, el) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('selectedRole').value = role;
      document.getElementById('dynamicFields').innerHTML = role === 'patient' ? patientFields : doctorFields;
    }

    // Initialize with patient fields
    selectRole('patient', document.querySelector('[data-role="patient"]'));

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      const sucEl = document.getElementById('successMsg');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match';
        errEl.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters';
        errEl.style.display = 'block';
        return;
      }

      const role = document.getElementById('selectedRole').value;
      const btn  = document.getElementById('registerBtn');
      UI.loading(btn, true);

      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password,
        role
      };

      if (role === 'patient') {
        body.age              = parseInt(document.getElementById('age')?.value) || null;
        body.gender           = document.getElementById('gender')?.value || '';
        body.blood_group      = document.getElementById('blood_group')?.value || '';
        body.emergency_contact= document.getElementById('emergency_contact')?.value || '';
        body.medical_history  = document.getElementById('medical_history')?.value || '';
      } else {
        body.specialization   = document.getElementById('specialization')?.value || '';
        body.license_number   = document.getElementById('license_number')?.value || '';
        body.hospital         = document.getElementById('hospital')?.value || '';
        body.experience_years = parseInt(document.getElementById('experience_years')?.value) || 0;
      }

      const res = await Http.post('/auth/register', body, false);
      UI.loading(btn, false);

      if (res.ok) {
        sucEl.textContent = res.data.message + (res.data.status === 'pending' ? ' Your account is awaiting admin approval.' : ' You can now log in.');
        sucEl.style.display = 'block';
        document.getElementById('registerForm').reset();
        selectRole('patient', document.querySelector('[data-role="patient"]'));
        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
      } else {
        errEl.textContent = res.data.error || 'Registration failed';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
